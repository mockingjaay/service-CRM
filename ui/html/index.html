<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Repair CRM</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; max-width: 400px; }
        div { margin-bottom: 10px; }
        label { display: block; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .order-card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Учет заказов</h1>

    <!-- Форма создания заказа -->
    <form action="/order/create" method="POST">
        <div>
            <label>Имя клиента</label>
            <input type="text" name="customer_name" required>
        </div>
        <div>
            <label>Устройство</label>
            <input type="text" name="device_name" required>
        </div>
        <div>
            <label>Описание поломки</label>
            <textarea name="description" required></textarea>
        </div>
        <button type="submit">Создать заказ</button>
    </form>

    <hr>

    <h2>Последние заказы</h2>
    {{if .}}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Клиент</th>
                    <th>Устройство</th>
                    <th>Статус</th>
                    <th>Дата</th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr>
                    <td>#{{.ID}}</td>
                    <td>{{.CustomerName}}</td>
                    <td>{{.DeviceName}}</td>
                    <td><b>{{.Status}}</b></td>
                    <td>{{.CreatedAt.Format "02.01.2006 15:04"}}</td>
                    <td>
                        <a href="/order/status?id={{.ID}}&status=в работе">В работу</a> | 
                        <a href="/order/status?id={{.ID}}&status=завершен">Завершить</a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    {{else}}
        <p>Заказов пока нет.</p>
    {{end}}
</body>
</html>
