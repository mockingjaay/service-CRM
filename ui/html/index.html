<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Repair CRM</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; max-width: 400px; }
        div { margin-bottom: 10px; }
        label { display: block; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .order-card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        /* Стили для блока фильтров */
        .filters { 
            background: #e9ecef; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
        }
        .filters form { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            background: none; 
            padding: 0; 
            max-width: 100%; 
            align-items: flex-end; 
        }
        .filters div { margin-bottom: 0; flex: 1; min-width: 150px; }
        .filters input, .filters select { height: 38px; }
        .btn-reset { color: #666; text-decoration: none; font-size: 14px; align-self: center; }
    </style>
</head>
<body>
    <h1>Учет заказов</h1>

    <!-- Форма создания заказа -->
    <form action="/order/create" method="POST">
        <div>
            <label>Имя клиента</label>
            <input type="text" name="customer_name" required>
        </div>
        <div>
            <label>Устройство</label>
            <input type="text" name="device_name" required>
        </div>
        <div>
            <label>Описание поломки</label>
            <textarea name="description" required></textarea>
        </div>
        <button type="submit">Создать заказ</button>
    </form>

    <hr>

    <h2>Последние заказы</h2>
    <div class="filters">
        <form hx-get="/" hx-target="#order-table" hx-select="#order-table" hx-trigger="keyup delay:100ms, change">
            <div>
                <label>Поиск по ID</label>
                <input type="number" name="search_id" placeholder="ID...">
            </div>
            <div>
                <label>Статус</label>
                <select name="status">
                    <option value="">Все статусы</option>
                    <option value="новый">Новые</option>
                    <option value="в работе">В работе</option>
                    <option value="завершен">Завершенные</option>
                </select>
            </div>
            <a href="/" class="btn-reset">Сбросить</a>
        </form>
    </div>
    <div id="order-table">
        {{if .}}
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Клиент</th>
                        <th>Устройство</th>
                        <th>Статус</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .}}
                    <tr>
                        <td>#{{.ID}}</td>
                        <td>{{.CustomerName}}</td>
                        <td>{{.DeviceName}}</td>
                        <td><b>{{.Status}}</b></td>
                        <td>{{.CreatedAt.Format "02.01.2006 15:04"}}</td>
                        <td>
                            <a href="/order/status?id={{.ID}}&status=в работе">В работу</a> | 
                            <a href="/order/status?id={{.ID}}&status=завершен">Завершить</a>
                            <a href="/order/delete?id={{.ID}}" style="color: red;" onclick="return confirm('Точно удалить?')">Удалить</a>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        {{else}}
            <p>Заказов пока нет.</p>
        {{end}}
    </div>
</body>
</html>
